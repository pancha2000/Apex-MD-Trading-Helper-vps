<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Scanner · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">

  <h1 class="page-title">⚡ AI Deep Scanner</h1>

  <!-- A-ADS 2431249 -->
  <div style="margin-bottom:20px;text-align:center">
    <div id="frame" style="width:100%;margin:auto;position:relative;z-index:99998">
      <iframe data-aa='2431249' src='//acceptable.a-ads.com/2431249/?size=Adaptive'
        style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>
  </div>

  <!-- ── Deep Analysis Hero ── -->
  <div class="scan-hero" style="margin-bottom:20px">
    <div style="flex:1">
      <div style="font-family:var(--font-head);font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:6px">Single Coin Deep Analysis</div>
      <div style="font-size:.82rem;color:var(--text2)">70-Factor SMC · Funding Rate · Daily Trend · AI Summary · Min RRR 1.5:1</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div><label class="field-label">Coin</label><input type="text" id="s-coin" class="inp" placeholder="BTC, ETH..." maxlength="12" style="width:130px;font-family:var(--font-mono);font-size:1.05rem;font-weight:700;text-transform:uppercase" autocomplete="off"></div>
      <div><label class="field-label">Timeframe</label><select id="s-tf" class="inp" style="width:120px"><option value="5m">5m</option><option value="15m" selected>15m</option><option value="1h">1h</option><option value="4h">4h</option><option value="1d">1d</option></select></div>
      <button id="scan-btn" class="btn btn-primary" style="padding:11px 24px;font-weight:700" onclick="doScan()">⚡ Analyze</button>
    </div>
  </div>

  <!-- ── Loading / Error / Result ── -->
  <div id="scan-loading" style="display:none" class="loading-center"><div class="spinner"></div><div style="margin-top:12px;color:var(--text2)">Deep analysis running...</div></div>
  <div id="scan-error" style="display:none" class="panel"><div class="panel-body" style="color:var(--red)"></div></div>
  <div id="scan-result" style="display:none"></div>

  <!-- ── Auto Market Scan ── -->
  <div class="panel" style="margin-top:24px">
    <div class="panel-head">
      <div class="panel-title">🔍 Auto Market Scan
        <span style="font-size:.75rem;color:var(--text2);margin-left:8px">Top 5 setups</span>
        <span id="user-threshold-badge" style="font-size:.72rem;margin-left:10px;padding:2px 8px;border-radius:99px;background:rgba(0,200,255,.1);color:var(--accent);border:1px solid rgba(0,200,255,.2)"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="loadMarketScan()">↺ Scan Now</button>
        <a href="/app/settings" class="btn btn-ghost btn-sm" style="font-size:.72rem">⚙️ Threshold</a>
      </div>
    </div>
    <div class="panel-body" id="market-scan-body"><div class="loading-center"><div class="spinner"></div></div></div>
  </div>

</div>

<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('scanner');

const userMinScore = D.minScore || 20;
document.getElementById('s-coin').addEventListener('keydown', e=>{if(e.key==='Enter')doScan();});
document.getElementById('s-coin').addEventListener('input', e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});

function fmtP(n){if(!n||isNaN(n))return'—';const p=parseFloat(n);if(p>=1000)return'$'+p.toFixed(2);if(p>=1)return'$'+p.toFixed(4);return'$'+p.toFixed(6);}

function fundingTag(rate) {
  if (rate === null || rate === undefined) return '';
  const r = parseFloat(rate);
  if (isNaN(r)) return '';
  const col = r > 0.1 ? 'var(--red)' : r < -0.1 ? 'var(--green)' : 'var(--text2)';
  const warn = Math.abs(r) > 0.1 ? ' ⚠️' : '';
  return `<span style="font-size:.7rem;color:${col};background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;font-family:var(--font-mono)">Funding: ${r>0?'+':''}${r.toFixed(3)}%${warn}</span>`;
}

function dailyTag(aligned, trend) {
  if (!trend || trend === 'Unknown ⚪') return '';
  return aligned
    ? `<span style="font-size:.7rem;color:var(--green);background:rgba(0,230,118,.1);padding:2px 6px;border-radius:4px">✅ Daily OK</span>`
    : `<span style="font-size:.7rem;color:var(--yellow);background:rgba(255,171,0,.1);padding:2px 6px;border-radius:4px">⚠️ Against Daily</span>`;
}

async function doScan() {
  const coin=document.getElementById('s-coin').value.trim();
  const tf=document.getElementById('s-tf').value;
  if(!coin){document.getElementById('s-coin').focus();return;}
  document.getElementById('scan-result').style.display='none';
  document.getElementById('scan-error').style.display='none';
  document.getElementById('scan-loading').style.display='block';
  document.getElementById('scan-btn').disabled=true;
  try {
    const d=await apiFetch('/app/api/scan',{method:'POST',body:JSON.stringify({coin,timeframe:tf})});
    document.getElementById('scan-loading').style.display='none';
    document.getElementById('scan-btn').disabled=false;
    if(!d.ok){document.getElementById('scan-error').querySelector('div').textContent='❌ '+(d.error||'Scan failed');document.getElementById('scan-error').style.display='block';return;}
    renderScanResult(d.analysis);
  } catch(e){document.getElementById('scan-loading').style.display='none';document.getElementById('scan-btn').disabled=false;document.getElementById('scan-error').querySelector('div').textContent='❌ Network error: '+e.message;document.getElementById('scan-error').style.display='block';}
}

function renderScanResult(a) {
  const isLong=a.direction==='LONG';
  const sc=a.score>=70?'var(--green)':a.score>=45?'var(--yellow)':'var(--red)';
  const sent=a.sentiment||{}, conf=a.confirmation||{}, ai=a.ai||null;
  const ww=a.whaleWalls||{}, liq=a.liquidation||{};
  const scoreBar = `<div style="background:var(--bg2);border-radius:99px;height:6px;margin-top:8px;overflow:hidden"><div style="width:${Math.min(a.score,100)}%;height:100%;background:${sc};border-radius:99px;transition:.5s"></div></div>`;
  const belowThreshold = a.score < userMinScore;
  const thresholdWarn  = belowThreshold ? `<div style="background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.25);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;color:var(--yellow)">⚠️ Score ${a.score} is below your threshold (${userMinScore}). This setup may not meet your quality standard. <a href="/app/settings" style="color:var(--accent)">Adjust →</a></div>` : '';

  const sec = (title, content) => `<div style="margin-top:14px;border-top:1px solid rgba(255,255,255,.06);padding-top:12px"><div style="font-size:.65rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">${title}</div>${content}</div>`;
  const row = (label, val, col='') => `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.79rem"><span style="color:var(--text2)">${label}</span><span style="font-family:var(--font-mono);${col?'color:'+col:''}">${val||'—'}</span></div>`;
  const pill = (text, col) => `<span style="background:${col||'rgba(255,255,255,.07)'};border-radius:4px;padding:2px 7px;font-size:.7rem;font-weight:600">${text}</span>`;

  document.getElementById('scan-result').style.display='block';
  document.getElementById('scan-result').innerHTML = `
    ${thresholdWarn}
    <div class="signal-card ${isLong?'long-card':'short-card'}">

      <!-- Header -->
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:12px">
        <div class="score-ring-lg" style="border-color:${sc};color:${sc}">${a.score}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
            <span style="font-family:var(--font-head);font-size:1.3rem;font-weight:800;color:#fff">${a.coin}</span>
            <span class="pill ${isLong?'pill-long':'pill-short'}">${isLong?'▲':'▼'} ${a.direction}</span>
            <span class="pill pill-${(a.orderType||'MARKET')==='LIMIT'?'pending':'active'}" style="font-size:.65rem">${a.orderType||'MARKET'}</span>
            ${pill(a.timeframe,'rgba(0,200,255,.12)')}
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
            ${fundingTag(a.fundingRate)}
            ${dailyTag(a.dailyAligned, a.dailyTrend)}
          </div>
          ${scoreBar}
          <div style="font-size:.75rem;color:var(--text2);margin-top:5px">4H:${a.trend4H||'—'} · 1H:${a.trend1H||'—'} · ${conf.strength||'—'}</div>
        </div>
      </div>

      <!-- Trade Setup -->
      <div class="signal-levels" style="margin-bottom:12px">
        <div class="sig-level"><div class="sig-level-label">Entry</div><div class="sig-level-val c-cyan">${fmtP(a.entryPrice)}</div><div style="font-size:.6rem;color:var(--text2)">${a.slLabel||'ATR'}</div></div>
        <div class="sig-level"><div class="sig-level-label">TP 1</div><div class="sig-level-val c-green">${fmtP(a.tp1)}</div></div>
        <div class="sig-level"><div class="sig-level-label">TP 2</div><div class="sig-level-val c-green">${fmtP(a.tp2)}</div></div>
        <div class="sig-level"><div class="sig-level-label">TP 3</div><div class="sig-level-val c-green">${fmtP(a.tp3)}</div></div>
        <div class="sig-level"><div class="sig-level-label">Stop Loss</div><div class="sig-level-val c-red">${fmtP(a.sl)}</div></div>
        <div class="sig-level"><div class="sig-level-label">DCA 1</div><div class="sig-level-val c-yellow">${fmtP(a.dca1)}</div></div>
        <div class="sig-level"><div class="sig-level-label">DCA 2</div><div class="sig-level-val c-yellow">${fmtP(a.dca2)}</div></div>
        <div class="sig-level"><div class="sig-level-label">Lev</div><div class="sig-level-val c-yellow">${a.leverage||1}x</div></div>
        <div class="sig-level"><div class="sig-level-label">RRR</div><div class="sig-level-val c-green">${a.rrr||'—'}:1</div></div>
      </div>

      <!-- Confluences -->
      ${a.reasons?`<div style="font-size:.74rem;color:var(--text2);line-height:1.7;background:rgba(0,0,0,.15);border-radius:6px;padding:8px 10px">✔️ ${String(a.reasons).replace(/,/g,' · ')}</div>`:''}

      <!-- Confirmation Verdict -->
      ${conf.verdict?`<div style="margin-top:10px;font-size:.78rem;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px;border-left:3px solid var(--accent)">${conf.verdict}${conf.detail?' — '+conf.detail:''}</div>`:''}

      <!-- ✅ NEW: Entry Quality Gate -->
      ${a.entryQuality ? `<div style="margin-top:10px;padding:10px 14px;border-radius:8px;border-left:4px solid ${
          a.entryQuality.color==='green'?'var(--green)':a.entryQuality.color==='red'?'var(--red)':'var(--yellow)'};background:rgba(0,0,0,.15)">
        <div style="font-size:.75rem;font-weight:700;color:${a.entryQuality.color==='green'?'var(--green)':a.entryQuality.color==='red'?'var(--red)':'var(--yellow)'}">
          ${a.entryQuality.action} <span style="font-size:.68rem;opacity:.7;margin-left:6px">[${a.entryQuality.grade}]</span>
        </div>
        <div style="font-size:.74rem;color:var(--text2);margin-top:3px">${a.entryQuality.detail}</div>
        ${a.entryQuality.blockEntry?`<div style="font-size:.72rem;color:var(--red);margin-top:4px;font-weight:600">⛔ Do not enter at market now</div>`:''}
      </div>` : ''}

      <!-- ✅ NEW: BTC Context -->
      ${a.btcContext && a.btcContext.trend !== 'UNKNOWN' ? `<div style="margin-top:8px;padding:7px 12px;border-radius:6px;background:rgba(255,165,0,.06);border:1px solid rgba(255,165,0,.15);font-size:.76rem">
        <span style="color:var(--text2)">BTC Context: </span><strong style="color:${a.btcContext.trend==='BULL'?'var(--green)':a.btcContext.trend==='BEAR'?'var(--red)':'var(--yellow)'}">${a.btcContext.display}</strong>
      </div>` : ''}

      <!-- ✅ NEW: Hidden Divergence -->
      ${a.hiddenDivergence && (a.hiddenDivergence.bull || a.hiddenDivergence.bear) ? `<div style="margin-top:8px;padding:7px 12px;border-radius:6px;background:rgba(0,200,100,.06);border:1px solid rgba(0,200,100,.15);font-size:.76rem">
        <strong style="color:var(--green)">${a.hiddenDivergence.display}</strong>
      </div>` : ''}

      <!-- ✅ NEW: MTF Fibonacci Zones -->
      ${a.mtfFibEntry && a.mtfFibEntry.zones?.length ? `<div style="margin-top:10px;background:rgba(0,0,0,.15);border-radius:8px;padding:10px 14px">
        <div style="font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">📐 MTF Fibonacci Zones</div>
        ${a.mtfFibEntry.zones.slice(0,3).map(z=>`<div style="display:flex;justify-content:space-between;font-size:.76rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <span style="color:${z.strength==='STRONG'?'var(--accent)':'var(--text2)'}">${z.label}</span>
          <span style="font-family:var(--font-mono);color:${Math.abs(z.price-parseFloat(a.currentPrice||0))/parseFloat(a.currentPrice||1)*100<1?'var(--green)':'var(--text)'}">$${parseFloat(z.price).toFixed(4)} ${Math.abs(z.price-parseFloat(a.currentPrice||0))/parseFloat(a.currentPrice||1)*100<1?'← HERE':'('+((Math.abs(z.price-parseFloat(a.currentPrice||0))/parseFloat(a.currentPrice||1))*100).toFixed(1)+'% away)'}</span>
        </div>`).join('')}
        ${a.mtfFibEntry.tps?.length ? `<div style="margin-top:8px"><div style="font-size:.68rem;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Fib TP Targets</div>
          ${a.mtfFibEntry.tps.slice(0,3).map(t=>`<div style="display:flex;justify-content:space-between;font-size:.75rem;padding:2px 0">
            <span style="color:var(--text2)">${t.label}</span>
            <span style="font-family:var(--font-mono);color:var(--green)">$${parseFloat(t.price).toFixed(4)}</span>
          </div>`).join('')}
        </div>` : ''}
      </div>` : ''}

      <!-- Position Size -->
      ${sec('💼 Position Size',
        row('Leverage', (a.leverage||1)+'x', 'var(--yellow)') +
        row('RRR', (a.rrr||'—')+':1', 'var(--green)') +
        row('Order Type', a.orderType||'MARKET')
      )}

      <!-- Technical Details -->
      ${sec('📊 Technical Indicators',
        row('RSI', a.rsi?parseFloat(a.rsi).toFixed(1):'—') +
        row('MACD', a.macd||'—') +
        row('Bollinger', (a.bb||a.bbands||'—')) +
        row('ADX', a.adx||'—') +
        row('StochRSI', a.stochRSI?.signal||'—') +
        row('Supertrend', a.supertrend?.signal||'—') +
        row('EMA Ribbon', a.emaRibbon?.signal||'—') +
        row('ChoCH', a.choch||'—') +
        row('Liq Sweep', a.liquiditySweep||'—')
      )}

      <!-- Advanced SMC / v5 -->
      ${sec('🧠 Advanced Intelligence',
        row('Wyckoff Phase', a.wyckoff?.phase||'—') +
        row('Breaker Block', a.breakers?.display||'None') +
        row('EQH/EQL', a.equalHL?.display||'None') +
        row('Ichimoku', a.ichimoku?.signal||'—') +
        row('CVD', a.cvd?.trend||'—') +
        row('Heikin Ashi', a.heikinAshi?.signal||'—') +
        row('Williams %R', a.williamsR?.value||'—') +
        row('Pivot Signal', a.pivotSignal?.display||'—') +
        row('Fib Confluence', a.fibConf?.hasConfluence?a.fibConf.count+'× at $'+a.fibConf.zone:'None')
      )}

      <!-- v6 Big Profit -->
      ${sec('⚡ v6 Big Profit Signals',
        row('BB Squeeze', a.bbSqueeze?.isSqueezing?'⚡ SQUEEZING':a.bbSqueeze?.exploding?'💥 EXPLOSION':'Normal') +
        row('Vol Expansion', a.volExpansion?.expanding?'📈 Expanding':'Stable') +
        row('MM Trap', a.mmTrap?.display||'None') +
        row('3TF Aligned', a.tf3Align?.aligned?(a.tf3Align.allBull?'🟢🟢🟢 All Bull':'🔴🔴🔴 All Bear'):'Partial') +
        row('Daily Trend', (a.dailyTrend||'—')+' '+(a.dailyAligned?'✅':'⚠️'))
      )}

      <!-- v7 PRO -->
      ${sec('🔮 v7 PRO Signals',
        row('Momentum', a.momentumShift?.isBull?'BULL '+a.momentumShift.bullSignals+'/6':a.momentumShift?.isBear?'BEAR '+a.momentumShift.bearSignals+'/6':'Neutral') +
        row('BOS', a.bos?.bullBOS?'🔺 Bullish BOS':a.bos?.bearBOS?'🔻 Bearish BOS':'None') +
        row('Candle Pattern', a.advCandles?.pattern||'None') +
        row('MFI', a.mfi?.value?a.mfi.value.toFixed(0)+' ('+a.mfi?.signal+')':'—') +
        row('CCI', a.cci?.value?a.cci.value.toFixed(0):'—') +
        row('Gann', a.gannAngles?.signal||'—') +
        row('Renko', a.renko?.isBull?'🧱 Bull '+a.renko.streak+'x':a.renko?.isBear?'🧱 Bear '+a.renko.streak+'x':'Neutral') +
        row('OTE Fib Zone', a.fibLevels?.isAtOTE?'🎯 AT OTE':'Not at OTE') +
        row('Dynamic S/R', a.dynamicSR?.nearSupport?'At Support 📊':a.dynamicSR?.nearResist?'At Resistance 📊':'Neutral')
      )}

      <!-- Market Context (Whale Walls + Sentiment) -->
      ${sec('🌊 Market Context',
        row('🐋 Buy Wall', ww.supportWall!=='N/A'?fmtP(ww.supportWall)+(ww.supportVol?' ('+ww.supportVol+')':''):'N/A') +
        row('🔴 Sell Wall', ww.resistWall!=='N/A'?fmtP(ww.resistWall)+(ww.resistVol?' ('+ww.resistVol+')':''):'N/A') +
        row('Liquidation', liq.sentiment||'N/A') +
        row('Funding Rate', a.fundingRate!=null?(parseFloat(a.fundingRate)>=0?'+':'')+parseFloat(a.fundingRate).toFixed(3)+'%':'N/A') +
        row('F&G Index', (sent.fngEmoji||'')+' '+(sent.fng||'N/A')+' ('+((sent.fng||0)>=60?'Greed':(sent.fng||0)<=40?'Fear':'Neutral')+')') +
        row('BTC Dominance', sent.btcDom?sent.btcDom+'%':'N/A') +
        row('News Score', sent.newsSentimentScore!=null?(sent.newsSentimentScore>0?'+':'')+sent.newsSentimentScore:'N/A') +
        row('Market Bias', sent.overall||'—')
      )}

      <!-- Entry Confirmation Score -->
      ${conf.totalScore!=null?sec('🔬 Entry Confirmation (8-Factor)',
        row('Total Score', (conf.totalScore>=0?'+':'')+conf.totalScore+' ('+conf.strength+')', conf.strength==='STRONG'?'var(--green)':conf.strength==='WEAK'?'var(--red)':'var(--yellow)') +
        row('Stablecoin Flow', conf.usdtDom||'N/A') +
        row('Open Interest', conf.oiChange||'N/A') +
        row('CVD Signal', conf.cvd||'N/A') +
        row('BTC Correlation', conf.btcCorr||'N/A')
      ):''}

      <!-- AI Summary -->
      ${ai?`<div style="margin-top:12px;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);border-radius:8px;padding:12px 14px">
        <div style="font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">🤖 AI Analysis</div>
        <div style="font-size:.82rem;color:var(--text);line-height:1.6">${ai.summary||''}</div>
        ${ai.confidence?`<div style="font-size:.75rem;color:var(--text2);margin-top:6px">Confidence: <strong style="color:var(--accent)">${ai.confidence}</strong> · Risk: <strong style="color:${ai.risk==='high'?'var(--red)':ai.risk==='low'?'var(--green)':'var(--yellow)'}">${ai.risk||'—'}</strong>${ai.keyLevel?` · Key: <strong style="color:var(--text)">${ai.keyLevel}</strong>`:''}</div>`:''}</div>`:''}

    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
      <button class="btn btn-warn" onclick="openPaperFromScan()">📄 Open Paper Trade</button>
      <button class="btn btn-ghost" onclick="document.getElementById('scan-result').style.display='none'">✕ Clear</button>
    </div>`;
  window._lastScan = a;
}

async function openPaperFromScan() {
  if(!window._lastScan){showToast('❌ No scan result','err');return;}
  const a=window._lastScan;
  const d=await apiFetch('/app/api/paper/open',{method:'POST',body:JSON.stringify({coin:a.coin,direction:a.direction,entry:a.entryPrice,tp2:a.tp2,sl:a.sl,leverage:a.leverage||10})});
  if(d.ok)showToast('✅ Paper trade opened! View in Paper tab.');else showToast('❌ '+(d.error||'Failed'),'err');
}

async function loadMarketScan() {
  const body=document.getElementById('market-scan-body');
  body.innerHTML='<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const d=await apiFetch('/app/api/market-scan');
    if(!d.ok){body.innerHTML='<div style="color:var(--red);padding:20px">❌ '+(d.error||'')+'</div>';return;}
    const setups=d.setups||[];
    // Update threshold badge
    const badge=document.getElementById('user-threshold-badge');
    if(badge){const t=d.userMinScore||userMinScore;badge.textContent='Min Score: '+t;}
    body.innerHTML = setups.length===0
      ? '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-msg">No high-probability setups right now — try again soon.</div></div>'
      : setups.map(s=>{
          const isL=s.direction==='LONG';const sc=s.score>=70?'var(--green)':s.score>=45?'var(--yellow)':'var(--red)';
          return `<div class="signal-card ${isL?'long-card':'short-card'}" style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:14px">
              <div class="score-ring" style="border-color:${sc};color:${sc}">${s.score}</div>
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                  <strong style="font-family:var(--font-head);font-size:1rem">${s.coin}</strong>
                  <span class="pill ${isL?'pill-long':'pill-short'}">${isL?'▲':'▼'} ${s.direction}</span>
                  <span style="font-size:.72rem;color:var(--text2);font-family:var(--font-mono)">Lev:${s.leverage}x · RRR:${s.rrr}:1</span>
                  ${s.dailyAligned===false?'<span style="font-size:.65rem;color:var(--yellow)">⚠️Daily</span>':''}
                  ${s.fundingRate!==null&&s.fundingRate!==undefined&&Math.abs(parseFloat(s.fundingRate))>0.1?`<span style="font-size:.65rem;color:${parseFloat(s.fundingRate)>0?'var(--red)':'var(--green)'}">F:${parseFloat(s.fundingRate).toFixed(3)}%</span>`:''}
                </div>
                <div style="font-size:.78rem;color:var(--text2);font-family:var(--font-mono)">
                  Entry:${fmtP(s.entryPrice)} · TP2:${fmtP(s.tp2)} · SL:${fmtP(s.sl)}
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="document.getElementById('s-coin').value='${s.coin}';doScan()">Deep Scan →</button>
            </div>
          </div>`;
        }).join('') + `<div style="font-size:.75rem;color:var(--text2);margin-top:10px;text-align:right">Scanned ${d.scanned||0} coins · Min Score: ${d.userMinScore||userMinScore}</div>`;
  } catch(e){body.innerHTML='<div style="color:var(--red);padding:20px">❌ '+e.message+'</div>';}
}
loadMarketScan();
</script>
</body>
</html>
