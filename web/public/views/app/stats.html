<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stats · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📊 My Statistics</h1>

  <!-- A-ADS 2431249 -->
  <div style="margin-bottom:20px;text-align:center">
    <div id="frame" style="width:100%;margin:auto;position:relative;z-index:99998">
      <iframe data-aa='2431249' src='//acceptable.a-ads.com/2431249/?size=Adaptive'
        style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>
  </div>
  <div class="g-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">Paper Balance</div><div class="stat-val c-yellow" id="paper-bal"></div></div>
  </div>

  <!-- Equity Curve Chart -->
  <div class="panel" style="margin-bottom:20px" id="equity-panel">
    <div class="panel-head"><div class="panel-title">📈 Equity Curve</div><span style="font-size:.75rem;color:var(--text2)">Cumulative PnL %</span></div>
    <div class="panel-body" style="padding:14px">
      <canvas id="equity-chart" height="120"></canvas>
      <div id="equity-empty" class="empty-state" style="display:none"><div class="empty-msg">No closed trades yet</div></div>
    </div>
  </div>

  <div id="stats-content"></div>
  <div style="margin-top:20px;text-align:right">
    <button class="btn btn-ghost btn-sm" onclick="resetStats()">↺ Reset Stats</button>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('stats');
document.getElementById('paper-bal').textContent = '$'+(D.paperBalance||'0.00');

// ── Equity Curve ─────────────────────────────────────────────
const eq = D.equityCurve || [];
if (eq.length < 2) {
  document.getElementById('equity-chart').style.display = 'none';
  document.getElementById('equity-empty').style.display = 'flex';
} else {
  const canvas = document.getElementById('equity-chart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth - 28;
  canvas.height = 120;
  const vals = eq.map(e => e.cumPnl);
  const mn = Math.min(...vals), mx = Math.max(...vals);
  const range = mx - mn || 1;
  const W = canvas.width, H = canvas.height, pad = 30;
  const x = i => pad + (i/(eq.length-1))*(W-pad*2);
  const y = v => H - pad - ((v-mn)/range)*(H-pad*2);
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 1;
  for(let i=0;i<4;i++){const yy=pad+(i/3)*(H-pad*2);ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad,yy);ctx.stroke();}
  // Zero line
  if (mn < 0 && mx > 0) {
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad,y(0));ctx.lineTo(W-pad,y(0));ctx.stroke();
    ctx.setLineDash([]);
  }
  // Area fill
  const grad = ctx.createLinearGradient(0,pad,0,H-pad);
  grad.addColorStop(0,'rgba(0,200,255,.25)');grad.addColorStop(1,'rgba(0,200,255,.02)');
  ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));
  eq.forEach((_,i)=>{if(i>0)ctx.lineTo(x(i),y(vals[i]));});
  ctx.lineTo(x(eq.length-1),H-pad);ctx.lineTo(x(0),H-pad);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));
  eq.forEach((_,i)=>{if(i>0)ctx.lineTo(x(i),y(vals[i]));});
  ctx.strokeStyle='rgba(0,200,255,.9)';ctx.lineWidth=2;ctx.stroke();
  // Dots on last
  ctx.beginPath();ctx.arc(x(eq.length-1),y(vals[vals.length-1]),4,0,Math.PI*2);
  ctx.fillStyle=vals[vals.length-1]>=0?'var(--green)':'var(--red)';ctx.fill();
  // Labels
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='10px monospace';
  ctx.fillText((mn>=0?'+':'')+mn.toFixed(1)+'%',2,H-pad);
  ctx.fillText((mx>=0?'+':'')+mx.toFixed(1)+'%',2,pad+4);
  const last=vals[vals.length-1];
  ctx.fillStyle=last>=0?'rgba(0,230,118,.9)':'rgba(255,51,85,.9)';
  ctx.font='bold 11px monospace';
  ctx.fillText((last>=0?'+':'')+last.toFixed(2)+'%',W-pad-60,y(last)-6);
}

// ── Stat blocks ──────────────────────────────────────────────
function statBlock(s, title, emoji) {
  if (!s) return `<div class="panel" style="margin-bottom:20px"><div class="panel-head"><div class="panel-title">${emoji} ${title}</div></div><div class="panel-body empty-state"><div class="empty-icon">🛑</div><div class="empty-msg">No closed trades yet.</div></div></div>`;
  const wrNum=parseFloat(s.wr), pnlNum=parseFloat(s.totalPnl);
  const wrCol=wrNum>=55?'var(--green)':wrNum>=45?'var(--yellow)':'var(--red)';
  const pnlCol=pnlNum>=0?'var(--green)':'var(--red)';
  const avgCol=parseFloat(s.avgPnl)>=0?'var(--green)':'var(--red)';
  return `<div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><div class="panel-title">${emoji} ${title}</div></div>
    <div class="panel-body">
      <div class="g-stats" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-val c-cyan">${s.total}</div></div>
        <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-val" style="color:${wrCol}">${s.wr}%</div></div>
        <div class="stat-card"><div class="stat-label">Wins / Losses</div><div class="stat-val c-green">${s.wins}<span style="color:var(--text2);font-size:1rem"> W</span></div><div class="stat-sub" style="color:var(--red)">${s.loss} losses</div></div>
        <div class="stat-card"><div class="stat-label">Total PnL</div><div class="stat-val" style="color:${pnlCol}">${pnlNum>=0?'+':''}${s.totalPnl}%</div></div>
        <div class="stat-card"><div class="stat-label">Avg PnL/Trade</div><div class="stat-val" style="color:${avgCol}">${parseFloat(s.avgPnl)>=0?'+':''}${s.avgPnl}%</div></div>
      </div>
      <div class="stat-row"><span>🏆 Best Trade</span><span class="stat-row-val c-green">${s.best?s.best.coin+' +'+s.best.pnl+'%':'—'}</span></div>
      <div class="stat-row"><span>💀 Worst Trade</span><span class="stat-row-val c-red">${s.worst?s.worst.coin+' '+s.worst.pnl+'%':'—'}</span></div>
    </div>
  </div>`;
}
document.getElementById('stats-content').innerHTML = statBlock(D.liveStats,'Live Trades','💰') + statBlock(D.paperStats,'Paper Trades','📄');

async function resetStats(){if(!confirm('Reset trade stats?'))return;const d=await apiFetch('/app/api/stats/reset',{method:'POST',body:'{}'});if(d.ok){showToast('✅ Stats reset');setTimeout(()=>location.reload(),800);}else showToast('❌ '+d.error,'err');}
</script>
</body>
</html>
