<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e0f0ff"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="iqGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon background -->
  <circle cx="26" cy="26" r="22" fill="#0a0f1e" opacity="0.9"/>
  <circle cx="26" cy="26" r="22" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.7"/>
  <!-- Chart bars -->
  <rect x="13" y="32" width="5" height="8" rx="1.5" fill="url(#iconGrad)" opacity="0.5"/>
  <rect x="20" y="24" width="5" height="16" rx="1.5" fill="url(#iconGrad)" opacity="0.75"/>
  <rect x="27" y="18" width="5" height="22" rx="1.5" fill="url(#iconGrad)"/>
  <!-- Trend arrow -->
  <polyline points="13,28 20,21 27,15 34,10" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <polygon points="34,10 30,12 33,16" fill="#00e5ff" filter="url(#glow)"/>
  <!-- APEX text -->
  <text x="56" y="33" font-family="'Arial Black',Arial,sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="url(#textGrad)">APEX</text>
  <!-- IQ gradient accent -->
  <text x="130" y="33" font-family="'Arial Black',Arial,sans-serif" font-size="24" font-weight="900" letter-spacing="1" fill="url(#iqGrad)" filter="url(#glow)">IQ</text>
  <!-- Accent line -->
  <line x1="56" y1="39" x2="163" y2="39" stroke="url(#iqGrad)" stroke-width="1.2" opacity="0.4"/>
  <!-- Tagline -->
  <text x="56" y="49" font-family="Arial,sans-serif" font-size="8" letter-spacing="2.5" fill="#00e5ff" opacity="0.55">AI TRADING INTELLIGENCE</text>
</svg>
