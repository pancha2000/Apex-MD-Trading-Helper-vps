<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00c8ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00c8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bolt icon -->
  <polygon points="22,4 14,26 20,26 12,46 28,20 21,20" fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- APEX-MD text -->
  <text x="36" y="32" font-family="'Arial Black',Arial,sans-serif"
        font-size="22" font-weight="900" letter-spacing="0.5"
        fill="url(#textGrad)">APEX-MD</text>

  <!-- Thin accent line below text -->
  <line x1="36" y1="38" x2="192" y2="38" stroke="#00c8ff" stroke-width="1" opacity="0.35"/>
</svg>
