<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Journal · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📓 Signal Journal</h1>

  <div style="margin-bottom:20px;text-align:center">
    <iframe data-aa='2431249' src='//acceptable.a-ads.com/2431249/?size=Adaptive'
      style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="showTab('signals')" id="jtab-signals">📡 Live Signals</button>
    <button class="btn btn-ghost btn-sm"   onclick="showTab('history')" id="jtab-history">📋 Trade History</button>
    <button class="btn btn-ghost btn-sm"   onclick="showTab('tagger')"  id="jtab-tagger">🔬 Auto-Tagger</button>
    <button class="btn btn-ghost btn-sm"   onclick="showTab('pairrank')" id="jtab-pairrank">🏆 Pair Ranker</button>
  </div>

  <!-- Live Signals Tab -->
  <div id="jtab-content-signals">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">📡 Live Signals</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="dot dot-green pulse" style="width:8px;height:8px"></span>
          <span style="font-size:.75rem;color:var(--text2)">Live</span>
        </div>
      </div>
      <div class="panel-body" id="live-signals"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- Trade History Tab -->
  <div id="jtab-content-history" style="display:none">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">📋 Trade Outcomes</div>
        <div id="journal-summary" style="font-size:.78rem;color:var(--text2)"></div>
      </div>
      <div class="panel-body" style="padding:0">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Coin</th><th>Dir</th><th>Score</th><th>Entry</th><th>TP2</th><th>SL</th><th>Result</th><th>PnL%</th><th>Type</th><th>Date</th></tr></thead>
            <tbody id="journal-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Auto-Tagger Tab -->
  <div id="jtab-content-tagger" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="panel">
        <div class="panel-head"><div class="panel-title">🔬 Confluence Win Rates</div><button class="btn btn-ghost btn-sm" onclick="loadTagger()">↻</button></div>
        <div class="panel-body" id="tagger-confluence"><div class="empty-state"><div class="empty-msg">Click ↻ to analyze</div></div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="panel-title">🎯 Score Threshold Optimizer</div></div>
        <div class="panel-body" id="tagger-score"><div class="empty-state"><div class="empty-msg">Loading with confluence...</div></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">📅 Monthly Performance</div></div>
      <div class="panel-body" id="tagger-monthly"></div>
    </div>
  </div>

  <!-- Pair Ranker Tab -->
  <div id="jtab-content-pairrank" style="display:none">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">🏆 Top Ranked Pairs</div>
        <button class="btn btn-ghost btn-sm" onclick="loadPairrank(true)">↻ Refresh</button>
      </div>
      <div class="panel-body" id="pairrank-content"><div class="empty-state"><div class="empty-msg">⏳ Loading...</div></div></div>
    </div>
  </div>

</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('journal');

function fmtP(n){if(!n||isNaN(n))return'—';const p=parseFloat(n);return p>=1000?'$'+p.toFixed(2):p>=1?'$'+p.toFixed(4):'$'+p.toFixed(6);}

function showTab(name) {
  ['signals','history','tagger','pairrank'].forEach(t => {
    document.getElementById('jtab-content-'+t).style.display = t===name?'block':'none';
    const b = document.getElementById('jtab-'+t);
    if(b) b.className = t===name?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
  });
  if (name==='tagger'   && !window._taggerLoaded)   loadTagger();
  if (name==='pairrank' && !window._pairrankLoaded) loadPairrank();
}

// ── Trade History ────────────────────────────────────────────
const history = D.history || [];
const wins = history.filter(t=>t.result==='WIN').length;
const losses = history.filter(t=>t.result==='LOSS').length;
const totalPnl = history.reduce((s,t)=>s+(t.pnlPct||0),0);
if (history.length) {
  document.getElementById('journal-summary').textContent =
    `${history.length} trades · ${wins}W/${losses}L · ${totalPnl>=0?'+':''}${totalPnl.toFixed(1)}%`;
}
document.getElementById('journal-body').innerHTML = !history.length
  ? '<tr><td colspan="10" class="empty-state"><div class="empty-msg">No closed trades yet</div></td></tr>'
  : history.map(t => {
      const dir = t.direction==='LONG'?'<span class="pill pill-long">▲ L</span>':'<span class="pill pill-short">▼ S</span>';
      const res = t.result==='WIN'?'<span class="pill pill-win">WIN</span>':t.result==='LOSS'?'<span class="pill pill-loss">LOSS</span>':'<span class="pill pill-be">B/E</span>';
      const pct = (t.pnlPct>=0?'+':'')+parseFloat(t.pnlPct).toFixed(2)+'%';
      const sc  = t.score>=70?'var(--green)':t.score>=45?'var(--yellow)':t.score>0?'var(--red)':'var(--text2)';
      return `<tr>
        <td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td>
        <td>${dir}</td>
        <td><span style="font-family:var(--font-mono);font-size:.82rem;color:${sc}">${t.score||'—'}</span></td>
        <td style="font-family:var(--font-mono);font-size:.82rem">${t.entry}</td>
        <td style="font-family:var(--font-mono);font-size:.82rem;color:var(--green)">${t.tp2}</td>
        <td style="font-family:var(--font-mono);font-size:.82rem;color:var(--red)">${t.sl}</td>
        <td>${res}</td>
        <td style="font-family:var(--font-mono);font-weight:700;color:${t.pnlPct>0?'var(--green)':t.pnlPct<0?'var(--red)':'var(--text2)'}">${pct}</td>
        <td style="font-size:.72rem;color:var(--text2)">${t.isPaper?'📄 Paper':'💰 Live'}</td>
        <td style="font-size:.78rem;color:var(--text2)">${t.closedAt}</td>
      </tr>`;
    }).join('');

// ── Auto-Tagger ──────────────────────────────────────────────
async function loadTagger() {
  window._taggerLoaded = true;
  document.getElementById('tagger-confluence').innerHTML = '<div class="empty-state"><div class="empty-msg">⏳ Analyzing...</div></div>';
  const [conf, score, monthly] = await Promise.all([
    apiFetch('/app/api/stats/confluence'),
    apiFetch('/app/api/stats/score-analysis'),
    apiFetch('/app/api/stats/advanced'),
  ]);

  // Confluence
  const tags = conf.tags || [];
  document.getElementById('tagger-confluence').innerHTML = !tags.length
    ? '<div class="empty-state"><div class="empty-msg">Need 3+ trades per signal to analyze</div></div>'
    : `<div style="font-size:.72rem;color:var(--text2);margin-bottom:10px">${conf.tradesAnalyzed} trades analyzed</div>
       <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.78rem">
         <tr style="color:var(--text2);font-size:.7rem"><th style="text-align:left;padding:4px 6px">Signal</th><th style="padding:4px">N</th><th style="padding:4px">Win%</th><th style="padding:4px">Avg PnL</th></tr>
         ${tags.map(t=>`<tr style="border-top:1px solid rgba(255,255,255,.05)">
           <td style="padding:4px 6px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.75rem">${t.tag}</td>
           <td style="text-align:center;padding:4px;color:var(--text2)">${t.total}</td>
           <td style="text-align:center;padding:4px;font-weight:600;color:${parseFloat(t.winRate)>=60?'var(--green)':parseFloat(t.winRate)>=50?'var(--yellow)':'var(--red)'}">${t.winRate}%</td>
           <td style="text-align:center;padding:4px;color:${parseFloat(t.avgPnl)>=0?'var(--green)':'var(--red)'}">${parseFloat(t.avgPnl)>=0?'+':''}${t.avgPnl}%</td>
         </tr>`).join('')}
       </table></div>`;

  // Score buckets
  const buckets = score.buckets || [];
  document.getElementById('tagger-score').innerHTML = !buckets.length
    ? '<div class="empty-state"><div class="empty-msg">Not enough data</div></div>'
    : `${score.recommendation?`<div style="background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.2);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:.78rem;color:var(--accent)">🎯 ${score.recommendation}</div>`:''}
       <table style="width:100%;border-collapse:collapse;font-size:.78rem">
         <tr style="color:var(--text2);font-size:.7rem"><th style="text-align:left;padding:4px 6px">Score</th><th style="padding:4px">N</th><th style="padding:4px">Win%</th><th style="padding:4px">PnL</th></tr>
         ${buckets.map(b=>`<tr style="border-top:1px solid rgba(255,255,255,.05);${b.min===score.optimalThreshold?'background:rgba(0,200,255,.06)':''}">
           <td style="padding:4px 6px;font-weight:${b.min===score.optimalThreshold?'700':'400'}">${b.label}${b.min===score.optimalThreshold?' ⭐':''}</td>
           <td style="text-align:center;padding:4px;color:var(--text2)">${b.trades}</td>
           <td style="text-align:center;padding:4px;color:${parseFloat(b.winRate)>=55?'var(--green)':parseFloat(b.winRate)>=45?'var(--yellow)':'var(--red)'}">${b.winRate}%</td>
           <td style="text-align:center;padding:4px;color:${parseFloat(b.avgPnl)>=0?'var(--green)':'var(--red)'}">${parseFloat(b.avgPnl)>=0?'+':''}${b.avgPnl}%</td>
         </tr>`).join('')}
       </table>`;

  // Monthly
  const mo = monthly.monthly || [];
  document.getElementById('tagger-monthly').innerHTML = !mo.length
    ? '<div class="empty-state"><div class="empty-msg">No monthly data yet</div></div>'
    : mo.map(m=>`<div class="stat-row">
        <span style="font-family:var(--font-mono)">${m.month}</span>
        <span style="display:flex;gap:14px;font-size:.8rem">
          <span style="color:var(--text2)">${m.trades} trades</span>
          <span style="color:${parseFloat(m.winRate)>=50?'var(--green)':'var(--red)'}">${m.winRate}%</span>
          <span style="color:${parseFloat(m.pnl)>=0?'var(--green)':'var(--red)'};font-weight:600">${parseFloat(m.pnl)>=0?'+':''}${m.pnl}%</span>
        </span>
      </div>`).join('');
}

// ── Pair Ranker ──────────────────────────────────────────────
async function loadPairrank(force = false) {
  window._pairrankLoaded = true;
  document.getElementById('pairrank-content').innerHTML = '<div class="empty-state"><div class="empty-msg">⏳ Fetching top pairs...</div></div>';
  const d = await apiFetch(force ? '/app/api/pairrank/refresh' : '/app/api/pairrank', force ? {method:'POST',body:'{}'} : undefined);
  if (!d.ok) { document.getElementById('pairrank-content').innerHTML = `<div class="empty-state"><div class="empty-msg">❌ ${d.error}</div></div>`; return; }
  const pairs = d.ranked || [];
  document.getElementById('pairrank-content').innerHTML = `
    <div style="font-size:.72rem;color:var(--text2);margin-bottom:10px">Updated: ${d.updatedAt ? new Date(d.updatedAt).toLocaleTimeString() : '—'}</div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.79rem">
        <tr style="color:var(--text2);font-size:.7rem;text-transform:uppercase">
          <th style="text-align:left;padding:6px 8px">#</th>
          <th style="text-align:left;padding:6px 8px">Coin</th>
          <th style="padding:6px">24h Vol</th>
          <th style="padding:6px">Change</th>
          <th style="padding:6px">Win Rate</th>
          <th style="padding:6px">Trades</th>
          <th style="padding:6px">Rating</th>
        </tr>
        ${pairs.slice(0,20).map((p,i)=>`<tr style="border-top:1px solid rgba(255,255,255,.05)">
          <td style="padding:6px 8px;color:var(--text2);font-size:.75rem">${i+1}</td>
          <td style="padding:6px 8px"><strong style="font-family:var(--font-mono)">${p.coin}</strong></td>
          <td style="text-align:center;padding:6px;color:var(--text2);font-size:.75rem">$${(p.volume24h/1e6).toFixed(0)}M</td>
          <td style="text-align:center;padding:6px;color:${p.priceChange>=0?'var(--green)':'var(--red)'}">${p.priceChange>=0?'+':''}${p.priceChange?.toFixed(2)}%</td>
          <td style="text-align:center;padding:6px;color:${p.winRate===null?'var(--text2)':parseFloat(p.winRate)>=55?'var(--green)':parseFloat(p.winRate)>=45?'var(--yellow)':'var(--red)'}">${p.winRate!=null?p.winRate+'%':'—'}</td>
          <td style="text-align:center;padding:6px;color:var(--text2)">${p.trades||0}</td>
          <td style="text-align:center;padding:6px">${p.tag}</td>
        </tr>`).join('')}
      </table>
    </div>`;
}

// ── Live Signals SSE ─────────────────────────────────────────
const liveEl = document.getElementById('live-signals');
const liveSignals = [];
function renderLive() {
  if (!liveSignals.length) { liveEl.innerHTML='<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-msg">Waiting for scanner signals...</div></div>'; return; }
  liveEl.innerHTML = liveSignals.slice(0,10).map(s=>{
    const isL=s.direction==='LONG', sc=s.score>=70?'var(--green)':s.score>=45?'var(--yellow)':'var(--red)';
    const age=Math.floor((Date.now()-s.ts)/60000), ageStr=age<60?age+'m ago':Math.floor(age/60)+'h ago';
    return `<div class="signal-card ${isL?'long-card':'short-card'}" style="margin-bottom:10px;padding:12px 16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="score-ring" style="border-color:${sc};color:${sc};width:38px;height:38px;font-size:.85rem">${s.score}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <strong style="font-family:var(--font-head)">${s.coin}</strong>
            <span class="pill ${isL?'pill-long':'pill-short'}">${isL?'▲':'▼'} ${s.direction}</span>
            <span style="font-size:.7rem;color:var(--text2)">${ageStr}</span>
          </div>
          <div style="font-size:.75rem;color:var(--text2);margin-top:4px;font-family:var(--font-mono)">Entry:${fmtP(s.price)} · TP2:${fmtP(s.tp2)} · SL:${fmtP(s.sl)} · ${s.leverage||1}x</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="window.location='/app/scanner'">Scan →</button>
      </div>
    </div>`;
  }).join('');
}
apiFetch('/app/api/signals/recent?limit=10').then(d=>{
  if(d.ok&&d.signals){liveSignals.push(...d.signals);} renderLive();
}).catch(()=>renderLive());
try {
  const es = new EventSource('/app/api/signals/stream');
  es.onmessage = e => { try { const s=JSON.parse(e.data); if(s.ping)return; liveSignals.unshift(s); renderLive(); } catch(_){} };
} catch(_){}
</script>
</body>
</html>
