<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
  <!-- Chart bars -->
  <rect x="5"  y="22" width="4" height="6" rx="1" fill="url(#accent)" opacity="0.4"/>
  <rect x="11" y="17" width="4" height="11" rx="1" fill="url(#accent)" opacity="0.7"/>
  <rect x="17" y="12" width="4" height="16" rx="1" fill="url(#accent)"/>
  <!-- Trend line + arrow -->
  <polyline points="7,20 13,14 19,9 26,5" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <polygon points="26,5 23,7 25,10" fill="#00e5ff" filter="url(#glow)"/>
</svg>
