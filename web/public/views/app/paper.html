<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paper Trading · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📄 Paper Trading <span>Virtual trades · Zero risk</span></h1>

  <!-- A-ADS 2431249 -->
  <div style="margin-bottom:20px;text-align:center">
    <div id="frame" style="width:100%;margin:auto;position:relative;z-index:99998">
      <iframe data-aa='2431249' src='//acceptable.a-ads.com/2431249/?size=Adaptive'
        style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>
  </div>
  <div id="wa-warn"></div>
  <div class="g-stats" style="margin-bottom:22px" id="stats-grid"></div>

  <div class="panel" style="margin-bottom:18px;border-color:rgba(255,171,0,.2)">
    <div class="panel-head">
      <div class="panel-title" style="color:var(--yellow)">📄 Open Paper Trade</div>
      <div style="font-size:.75rem;color:var(--text2)">Manual entry · TP1 auto-calculated if blank</div>
    </div>
    <div class="panel-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px">
        <div><label class="field-label">Coin</label><input type="text" id="pt-coin" class="inp" placeholder="BTC" style="font-family:var(--font-mono);font-weight:700;text-transform:uppercase" maxlength="10"></div>
        <div><label class="field-label">Direction</label><select id="pt-dir" class="inp"><option value="LONG">▲ LONG</option><option value="SHORT">▼ SHORT</option></select></div>
        <div><label class="field-label">Entry Price</label><input type="number" id="pt-entry" class="inp" placeholder="0.00" step="any" oninput="autoCalcTP()"></div>
        <div><label class="field-label">TP1 <span style="color:var(--text2);font-size:.7rem">(optional)</span></label><input type="number" id="pt-tp1" class="inp" placeholder="auto" step="any"></div>
        <div><label class="field-label">TP2 Price</label><input type="number" id="pt-tp2" class="inp" placeholder="0.00" step="any" oninput="autoCalcTP()"></div>
        <div><label class="field-label">SL Price</label><input type="number" id="pt-sl" class="inp" placeholder="0.00" step="any"></div>
        <div><label class="field-label">Leverage</label><input type="number" id="pt-lev" class="inp" placeholder="10" value="10" min="1" max="125"></div>
      </div>
      <div id="rrr-preview" style="font-size:.78rem;color:var(--text2);margin-bottom:10px"></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-warn" onclick="openPaperTrade()">📄 Open Trade</button>
        <button class="btn btn-ghost btn-sm" onclick="resetPaper()">↺ Reset Account</button>
        <div id="pt-msg" style="font-size:.83rem"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:10px;align-items:flex-end">
        <div><label class="field-label">Set Capital ($)</label><input type="number" id="cap-inp" class="inp" placeholder="1000" min="10" step="1" style="width:120px"></div>
        <button class="btn btn-ghost btn-sm" onclick="setCapital()">Set</button>
        <div id="cap-msg" style="font-size:.82rem"></div>
      </div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head">
      <div class="panel-title">⚡ Open Positions</div>
      <button class="btn btn-ghost btn-sm" onclick="refreshLivePnl()">↺ Live P&L</button>
    </div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP1</th><th>TP2</th><th>SL</th><th>Lev</th><th>Live P&L</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="active-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><div class="panel-title">📜 Closed Paper Trades</div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP1</th><th>TP2</th><th>SL</th><th>Result</th><th>Profit</th></tr></thead>
          <tbody id="closed-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('paper');

if (!D.waLinked) {
  document.getElementById('wa-warn').innerHTML = '<div style="background:rgba(255,171,0,.07);border:1px solid rgba(255,171,0,.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:.85rem;color:var(--yellow)">⚠️ <strong>WhatsApp not linked.</strong> Paper balance is tied to your WhatsApp. <a href="/app/settings">Link →</a></div>';
}

const s = D.stats || {};
document.getElementById('stats-grid').innerHTML = [
  { label:'Paper Balance', val:'$'+s.balance,   cls:'c-yellow', sub:'Virtual wallet' },
  { label:'Start Balance', val:'$'+s.startBal,  cls:'',         sub:'Baseline' },
  { label:'Net P&L',       val:s.pnlAmt||'',    cls:'',         sub:s.pnlPct||'', style:'color:'+s.pnlColor },
  { label:'Win Rate',      val:s.winRate||'—',  cls:'c-green',  sub:s.wins+'W / '+s.losses+'L' },
  { label:'Open Positions',val:s.openCount||0,  cls:'c-cyan',   sub:'Max 5' },
].map(c=>`<div class="stat-card"><div class="stat-label">${c.label}</div><div class="stat-val ${c.cls}" style="${c.style||''}">${c.val}</div><div class="stat-sub">${c.sub}</div></div>`).join('');

function fmtP(n){if(!n||isNaN(n))return'—';const p=parseFloat(n);return p>=1000?'$'+p.toFixed(2):p>=1?'$'+p.toFixed(4):'$'+p.toFixed(6);}

// ── Auto RRR preview ──────────────────────────────────────────
function autoCalcTP() {
  const e=parseFloat(document.getElementById('pt-entry').value);
  const t=parseFloat(document.getElementById('pt-tp2').value);
  const sl=parseFloat(document.getElementById('pt-sl').value);
  const prev=document.getElementById('rrr-preview');
  if(e&&t&&sl) {
    const risk=Math.abs(e-sl), reward=Math.abs(t-e);
    const rrr=risk>0?(reward/risk).toFixed(2):'—';
    const col=parseFloat(rrr)>=1.5?'var(--green)':parseFloat(rrr)>=1?'var(--yellow)':'var(--red)';
    prev.innerHTML=`RRR: <strong style="color:${col}">${rrr}:1</strong> ${parseFloat(rrr)<1.5?'<span style="color:var(--yellow)">⚠️ Below 1.5:1</span>':'<span style="color:var(--green)">✅</span>'}`;
    // Auto-fill TP1 midpoint
    if(!document.getElementById('pt-tp1').value) {
      document.getElementById('pt-tp1').placeholder = ((e+t)/2).toFixed(4)+' (auto)';
    }
  } else { prev.innerHTML=''; }
}

const active = D.activePaper || [];
const livePnl = {};

function renderActiveRows() {
  document.getElementById('active-body').innerHTML = active.length === 0
    ? '<tr><td colspan="10" class="empty-state"><div class="empty-icon">📄</div><div class="empty-msg">No open positions — open a trade above or from <a href="/app/scanner">Scanner</a></div></td></tr>'
    : active.map(t => {
        const dir       = t.direction==='LONG'?'<span class="pill pill-long">▲ L</span>':'<span class="pill pill-short">▼ S</span>';
        const st        = t.status==='pending'?'<span class="pill pill-pending">LIMIT</span>':'<span class="pill pill-active">LIVE</span>';
        const isPending = t.status === 'pending';
        const isL       = t.direction === 'LONG';
        const entryN    = parseFloat(t.entry)||0;
        const tp1N      = parseFloat(t.tp1)||0;
        const tp2N      = parseFloat(t.tp2)||0;
        const slN       = parseFloat(t.sl)||0;

        const entryDisplay = isPending
          ? `<span style="color:var(--accent)">$${t.entry}</span><div style="font-size:.62rem;color:var(--text2)">limit</div>`
          : `<span style="font-family:var(--font-mono)">$${t.entry}</span>`;

        const actionBtns = isPending
          ? `<div style="display:flex;gap:6px">
               <button class="btn btn-sm" style="background:rgba(0,200,255,.12);color:var(--accent);border:1px solid rgba(0,200,255,.25)" onclick="editLimitOrder('${t._id}','${t.entry}','${t.sl}','${t.tp2}')">✏️</button>
               <button class="btn btn-danger btn-sm" onclick="cancelLimitOrder('${t._id}','${t.coin}')">✕</button>
             </div>`
          : `<button class="btn btn-danger btn-sm" onclick="closeTrade('${t._id}','${t.coin}')">Close</button>`;

        return `<tr id="row-${t._id}" style="${isPending?'opacity:.85;background:rgba(0,200,255,.03)':''}">
          <td>
            <strong style="font-family:var(--font-mono)">${t.coin}</strong>
            ${isPending&&t.zoneLabel?`<div style="font-size:.62rem;color:var(--text2)">${t.zoneLabel}</div>`:''}
            ${!isPending?`<div style="font-size:.62rem;color:var(--text2)">${t.ageHrs}h open</div>`:''}
          </td>
          <td>${dir}</td>
          <td>${entryDisplay}</td>
          <td style="font-family:var(--font-mono);color:var(--text3)">${t.tp1||'—'}</td>
          <td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td>
          <td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td>
          <td style="font-family:var(--font-mono)">${t.leverage}x</td>
          <td id="pnl-${t._id}" style="font-weight:600;color:var(--text2)">
            ${isPending?'<span style="font-size:.75rem">⏳ waiting</span>':'<span style="font-size:.75rem;color:var(--text2)">loading...</span>'}
          </td>
          <td>
            ${st}
            <div id="tp-bar-${t._id}" style="width:80px;margin-top:4px"></div>
          </td>
          <td>${actionBtns}</td>
        </tr>
        <tr id="warn-row-${t._id}" style="background:transparent">
          <td colspan="10" style="padding:0 8px 4px;border:none">
            <div id="warn-${t._id}"></div>
          </td>
        </tr>`;
      }).join('');
}
renderActiveRows();

const closed = D.closedPaper || [];
document.getElementById('closed-body').innerHTML = closed.length === 0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No closed trades yet</div></td></tr>'
  : closed.map(t => {
      const dir=t.direction==='LONG'?'<span class="pill pill-long">▲ L</span>':'<span class="pill pill-short">▼ S</span>';
      const res=t.result==='WIN'?'<span class="pill pill-win">WIN</span>':t.result==='LOSS'?'<span class="pill pill-loss">LOSS</span>':'<span class="pill pill-be">B/E</span>';
      return `<tr>
        <td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td>
        <td>${dir}</td>
        <td style="font-family:var(--font-mono)">${t.entry}</td>
        <td style="font-family:var(--font-mono);color:var(--text3)">${t.tp1||'—'}</td>
        <td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td>
        <td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td>
        <td>${res}</td>
        <td style="font-family:var(--font-mono);font-weight:700;color:${t.profitColor}">${t.profit}</td>
      </tr>`;
    }).join('');

// ── Live P&L + TP Progress + Warnings ───────────────────────
async function refreshLivePnl() {
  const liveActive = active.filter(t => t.status !== 'pending');
  if (!liveActive.length) return;

  // Fetch prices directly from Binance for active trades
  const coins = [...new Set(liveActive.map(t => t.coin+'USDT'))];
  const priceMap = {};
  await Promise.all(coins.map(async coin => {
    try {
      const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${coin}`);
      const d = await r.json();
      priceMap[coin] = parseFloat(d.price);
    } catch(_) {}
  }));

  liveActive.forEach(t => {
    const el  = document.getElementById('pnl-'+t._id);
    const bar = document.getElementById('tp-bar-'+t._id);
    if (!el) return;

    const coin = t.coin+'USDT';
    const cur  = priceMap[coin];
    if (!cur) { el.innerHTML = '<span style="color:var(--text2)">—</span>'; return; }

    const entry = parseFloat(t.entry)||0;
    const tp1   = parseFloat(t.tp1)||0;
    const tp2   = parseFloat(t.tp2)||0;
    const sl    = parseFloat(t.sl)||0;
    const isL   = t.direction === 'LONG';

    // P&L calculation
    const diff  = isL ? cur - entry : entry - cur;
    const pct   = entry > 0 ? (diff/entry*100) : 0;
    const pctStr= (pct>=0?'+':'')+pct.toFixed(2)+'%';
    const col   = pct > 0 ? 'var(--green)' : pct < 0 ? 'var(--red)' : 'var(--text2)';

    // Current price display
    const curStr = cur >= 1 ? '$'+cur.toFixed(4) : '$'+cur.toFixed(6);

    el.innerHTML = `
      <div style="font-family:var(--font-mono);color:${col};font-weight:700;font-size:.82rem">${pctStr}</div>
      <div style="font-size:.67rem;color:var(--text2)">${curStr}</div>`;

    // ── TP Progress Bar ─────────────────────────────────────
    if (bar && tp1 > 0) {
      const totalMove = Math.abs(tp1 - entry);
      const curMove   = isL ? Math.max(0, cur - entry) : Math.max(0, entry - cur);
      const progress  = totalMove > 0 ? Math.min(100, (curMove/totalMove)*100) : 0;
      const barCol    = progress >= 80 ? 'var(--green)' : progress >= 40 ? 'var(--yellow)' : 'var(--accent)';
      bar.innerHTML = `
        <div style="font-size:.6rem;color:var(--text2);margin-bottom:2px">TP1 ${progress.toFixed(0)}%</div>
        <div style="background:rgba(255,255,255,.08);border-radius:99px;height:4px;overflow:hidden">
          <div style="width:${progress}%;height:100%;background:${barCol};border-radius:99px;transition:.5s"></div>
        </div>`;
    }

    // ── Smart Warnings ──────────────────────────────────────
    const warnEl = document.getElementById('warn-'+t._id);
    if (!warnEl) return;

    const distToTP1Pct = tp1 > 0 ? Math.abs(cur - tp1)/tp1*100 : 999;
    const distToSLPct  = sl  > 0 ? Math.abs(cur - sl)/sl*100   : 999;
    const betweenEntrySL = isL ? cur < entry && cur > sl : cur > entry && cur < sl;
    const nearSL       = distToSLPct < 1.5;
    const nearTP1      = distToTP1Pct < 1.5;
    const tp1Hit       = isL ? cur >= tp1 : cur <= tp1;

    let warn = '';
    if (tp1Hit && !t.tp1Hit) {
      warn = `<div style="background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:6px;padding:5px 8px;font-size:.7rem;color:var(--green)">
        🎯 TP1 Reached! Consider partial close or move SL to entry.
      </div>`;
    } else if (nearTP1) {
      warn = `<div style="background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.2);border-radius:6px;padding:5px 8px;font-size:.7rem;color:var(--green)">
        📍 Approaching TP1 (${distToTP1Pct.toFixed(1)}% away) — ready to close?
      </div>`;
    } else if (nearSL) {
      warn = `<div style="background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);border-radius:6px;padding:5px 8px;font-size:.7rem;color:var(--red)">
        ⚠️ Price near Stop Loss (${distToSLPct.toFixed(1)}% away) — monitor closely!
      </div>`;
    } else if (betweenEntrySL && pct < -1.5) {
      warn = `<div style="background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.2);border-radius:6px;padding:5px 8px;font-size:.7rem;color:var(--yellow)">
        📉 Trade moving toward SL — DCA zone or wait for reversal?
      </div>`;
    }
    warnEl.innerHTML = warn;
  });
}

// Auto-refresh every 20s
if (active.filter(t=>t.status!=='pending').length) {
  refreshLivePnl();
  setInterval(refreshLivePnl, 20000);
}

async function openPaperTrade() {
  const msg = document.getElementById('pt-msg');
  const coin = document.getElementById('pt-coin').value.trim().toUpperCase();
  const dir  = document.getElementById('pt-dir').value;
  const entry= parseFloat(document.getElementById('pt-entry').value);
  const tp1  = document.getElementById('pt-tp1').value ? parseFloat(document.getElementById('pt-tp1').value) : null;
  const tp2  = parseFloat(document.getElementById('pt-tp2').value);
  const sl   = parseFloat(document.getElementById('pt-sl').value);
  const lev  = parseInt(document.getElementById('pt-lev').value)||10;
  if (!coin||!entry||!tp2||!sl) { msg.style.color='var(--red)'; msg.textContent='❌ Fill Coin, Entry, TP2, SL'; return; }
  msg.style.color='var(--text2)'; msg.textContent='⏳ Opening...';
  try {
    const body = {coin,direction:dir,entry,tp2,sl,leverage:lev};
    if (tp1) body.tp1 = tp1;
    const d = await apiFetch('/app/api/paper/open', {method:'POST',body:JSON.stringify(body)});
    if (d.ok) { showToast('✅ Paper trade opened!'); setTimeout(()=>location.reload(),800); }
    else { msg.style.color='var(--red)'; msg.textContent='❌ '+(d.error||'Failed'); }
  } catch(e) { msg.style.color='var(--red)'; msg.textContent='❌ Network error'; }
}

async function cancelLimitOrder(id, coin) {
  if(!confirm('Cancel limit order for '+coin+'?')) return;
  const d = await apiFetch('/app/api/paper/cancel-limit/'+id, {method:'POST'});
  if(d.ok){ showToast('🗑️ Limit order cancelled'); document.getElementById('row-'+id)?.remove(); }
  else showToast('❌ '+(d.error||'Failed'),'err');
}

async function editLimitOrder(id, curLimit, curSL, curTP2) {
  const newLimit = prompt('New limit price (current: '+curLimit+'):', curLimit);
  if(!newLimit || isNaN(newLimit)) return;
  const newSL = prompt('New stop loss (current: '+curSL+'):', curSL);
  if(!newSL || isNaN(newSL)) return;
  const d = await apiFetch('/app/api/paper/update-limit/'+id, {method:'POST',body:JSON.stringify({limitPrice:newLimit,sl:newSL})});
  if(d.ok){ showToast('✅ Limit order updated — reload to see changes'); }
  else showToast('❌ '+(d.error||'Failed'),'err');
}

async function closeTrade(id, coin) {
  if (!confirm('Close '+coin+' paper trade at current market price?')) return;
  try {
    const d = await apiFetch('/app/api/paper/close/'+id, {method:'POST',body:JSON.stringify({})});
    showToast(d.ok?'✅ Closed: '+(d.result||'')+(d.profit?` $${d.profit}`:''):'❌ '+(d.error||''), d.ok?'ok':'err');
    if (d.ok) setTimeout(()=>location.reload(),900);
  } catch { showToast('❌ Network error','err'); }
}

async function resetPaper() {
  if (!confirm('Reset paper account to $100? This closes all open trades.')) return;
  const d = await apiFetch('/app/api/paper/reset', {method:'POST',body:JSON.stringify({})});
  if (d.ok) { showToast('✅ Reset to $100'); setTimeout(()=>location.reload(),800); }
  else showToast('❌ '+(d.error||''),'err');
}

async function setCapital() {
  const v=parseFloat(document.getElementById('cap-inp').value), msg=document.getElementById('cap-msg');
  if(!v||v<10){msg.style.color='var(--red)';msg.textContent='❌ Min $10';return;}
  const d=await apiFetch('/app/api/paper/set-capital',{method:'POST',body:JSON.stringify({amount:v})});
  if(d.ok){msg.style.color='var(--green)';msg.textContent='✅ Set to $'+v;setTimeout(()=>location.reload(),900);}
  else{msg.style.color='var(--red)';msg.textContent='❌ '+(d.error||'');}
}
</script>
</body>
</html>
