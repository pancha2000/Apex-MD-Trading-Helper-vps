<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Trades · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📋 My Trades</h1>
  <div class="g-stats" style="margin-bottom:24px" id="summary-grid"></div>
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><div class="panel-title">⚡ Active &amp; Pending</div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP1</th><th>TP2</th><th>SL</th><th>Lev</th><th>Status</th></tr></thead>
          <tbody id="active-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">📜 Trade History <span style="font-size:.78rem;color:var(--text2);margin-left:6px">(Last 100)</span></div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP2</th><th>SL</th><th>Result</th><th>PnL %</th><th>Date</th></tr></thead>
          <tbody id="closed-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
window._apexUser = { username: '' };
renderUserNav('trades');

const s = D.summary || {};
const pnlNum = parseFloat(s.totalPnl||0);
document.getElementById('summary-grid').innerHTML = [
  { label:'Closed Trades', val: s.totalClosed||0,  cls:'c-cyan' },
  { label:'Win Rate',      val: s.winRate||'—',     cls:'c-green' },
  { label:'Total PnL',     val: (pnlNum>=0?'+':'')+pnlNum.toFixed(2)+'%', cls: pnlNum>=0?'c-green':'c-red' },
].map(c => `<div class="stat-card"><div class="stat-label">${c.label}</div><div class="stat-val ${c.cls}">${c.val}</div></div>`).join('');

const active = D.activeTrades || [];
document.getElementById('active-body').innerHTML = active.length === 0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No active trades</div></td></tr>'
  : active.map(t => {
      const dir = t.direction==='LONG'?'<span class="pill pill-long">▲ LONG</span>':'<span class="pill pill-short">▼ SHORT</span>';
      const st  = t.status==='pending'?'<span class="pill pill-pending">PENDING</span>':'<span class="pill pill-active">ACTIVE</span>';
      return `<tr><td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td><td>${dir}</td><td style="font-family:var(--font-mono)">${t.entry}</td><td style="font-family:var(--font-mono);color:var(--text3)">${t.tp1}</td><td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td><td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td><td style="font-family:var(--font-mono)">${t.leverage}x</td><td>${st} <span style="color:var(--text2);font-size:.72rem">${t.ageHrs}h</span></td></tr>`;
    }).join('');

const closed = D.closedTrades || [];
document.getElementById('closed-body').innerHTML = closed.length === 0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No trade history yet</div></td></tr>'
  : closed.map(t => {
      const dir    = t.direction==='LONG'?'<span class="pill pill-long">▲ LONG</span>':'<span class="pill pill-short">▼ SHORT</span>';
      const result = t.result==='WIN'?'<span class="pill pill-win">WIN</span>':t.result==='LOSS'?'<span class="pill pill-loss">LOSS</span>':'<span class="pill pill-be">B/E</span>';
      const pnl    = t.pnlPct?(t.pnlPct>=0?'+':'')+parseFloat(t.pnlPct).toFixed(2)+'%':'—';
      const col    = t.pnlPct>0?'var(--green)':t.pnlPct<0?'var(--red)':'var(--text2)';
      return `<tr><td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td><td>${dir}</td><td style="font-family:var(--font-mono)">${t.entry}</td><td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td><td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td><td>${result}</td><td style="font-family:var(--font-mono);font-weight:700;color:${col}">${pnl}</td><td style="font-size:.8rem;color:var(--text2)">${t.closedAt}</td></tr>`;
    }).join('');
</script>
</body>
</html>
