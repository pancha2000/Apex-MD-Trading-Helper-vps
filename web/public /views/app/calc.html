<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Risk Calc · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap" style="max-width:700px">
  <h1 class="page-title">🧮 Risk / Position Calculator</h1>
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="field"><label class="field-label">Account Capital ($)</label><input type="number" id="c-capital" class="inp" value="1000" min="1" step="1"></div>
        <div class="field"><label class="field-label">Risk per Trade (%)</label><input type="number" id="c-risk" class="inp" value="2" min="0.1" max="100" step="0.1"></div>
        <div class="field"><label class="field-label">Entry Price</label><input type="number" id="c-entry" class="inp" placeholder="0.00" step="any"></div>
        <div class="field"><label class="field-label">Stop Loss Price</label><input type="number" id="c-sl" class="inp" placeholder="0.00" step="any"></div>
        <div class="field"><label class="field-label">Take Profit (TP2)</label><input type="number" id="c-tp" class="inp" placeholder="0.00" step="any"></div>
        <div class="field"><label class="field-label">Leverage</label><input type="number" id="c-lev" class="inp" value="10" min="1" max="125" step="1"></div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="calc()">🧮 Calculate</button>
    </div>
  </div>
  <div id="result" style="display:none" class="panel">
    <div class="panel-head"><div class="panel-title">📊 Position Sizing Results</div></div>
    <div class="panel-body" id="result-body"></div>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
renderUserNav('calc');
function calc() {
  const cap=parseFloat(document.getElementById('c-capital').value)||0;
  const riskPct=parseFloat(document.getElementById('c-risk').value)||2;
  const entry=parseFloat(document.getElementById('c-entry').value)||0;
  const sl=parseFloat(document.getElementById('c-sl').value)||0;
  const tp=parseFloat(document.getElementById('c-tp').value)||0;
  const lev=parseFloat(document.getElementById('c-lev').value)||10;
  if(!entry||!sl){showToast('❌ Entry and SL required','err');return;}
  const riskAmt=cap*(riskPct/100);
  const slDist=Math.abs(entry-sl);
  const qty=slDist>0?riskAmt/slDist:0;
  const positionSize=qty*entry;
  const marginNeeded=positionSize/lev;
  const rrr=tp&&slDist>0?(Math.abs(tp-entry)/slDist).toFixed(2):'—';
  const pnlIfTp=tp?qty*Math.abs(tp-entry):0;
  const pnlIfSl=qty*slDist;
  document.getElementById('result').style.display='block';
  document.getElementById('result-body').innerHTML = [
    ['Risk Amount', '$'+riskAmt.toFixed(2), 'c-red'],
    ['Position Size', '$'+positionSize.toFixed(2), 'c-cyan'],
    ['Margin Required', '$'+marginNeeded.toFixed(2), 'c-yellow'],
    ['Quantity', qty.toFixed(6)+' units', ''],
    ['Risk : Reward', '1 : '+rrr, 'c-green'],
    ['Profit if TP hit', tp?'+$'+pnlIfTp.toFixed(2):'—', 'c-green'],
    ['Loss if SL hit', '-$'+pnlIfSl.toFixed(2), 'c-red'],
    ['Liquidation est.', '$'+(entry>sl?entry*(1-1/lev):entry*(1+1/lev)).toFixed(4), 'c-red'],
  ].map(([label,val,cls])=>`<div class="stat-row"><span>${label}</span><span class="stat-row-val ${cls}">${val}</span></div>`).join('');
}
</script>
</body>
</html>
