<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stats · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📊 My Statistics</h1>
  <div class="g-stats" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">Paper Balance</div><div class="stat-val c-yellow" id="paper-bal"></div></div>
  </div>
  <div id="stats-content"></div>
  <div style="margin-top:20px;text-align:right">
    <button class="btn btn-ghost btn-sm" onclick="resetStats()">↺ Reset Stats</button>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('stats');
document.getElementById('paper-bal').textContent = '$'+(D.paperBalance||'0.00');
function statBlock(s, title, emoji) {
  if (!s) return `<div class="panel" style="margin-bottom:20px"><div class="panel-head"><div class="panel-title">${emoji} ${title}</div></div><div class="panel-body empty-state"><div class="empty-icon">🛑</div><div class="empty-msg">No closed trades yet.</div></div></div>`;
  const wrNum=parseFloat(s.wr), pnlNum=parseFloat(s.totalPnl);
  const wrCol=wrNum>=55?'var(--green)':wrNum>=45?'var(--yellow)':'var(--red)';
  const pnlCol=pnlNum>=0?'var(--green)':'var(--red)';
  const avgCol=parseFloat(s.avgPnl)>=0?'var(--green)':'var(--red)';
  return `<div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><div class="panel-title">${emoji} ${title}</div></div>
    <div class="panel-body">
      <div class="g-stats" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-val c-cyan">${s.total}</div></div>
        <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-val" style="color:${wrCol}">${s.wr}%</div></div>
        <div class="stat-card"><div class="stat-label">Wins / Losses</div><div class="stat-val c-green">${s.wins}<span style="color:var(--text2);font-size:1rem"> W</span></div><div class="stat-sub" style="color:var(--red)">${s.loss} losses</div></div>
        <div class="stat-card"><div class="stat-label">Total PnL</div><div class="stat-val" style="color:${pnlCol}">${pnlNum>=0?'+':''}${s.totalPnl}%</div></div>
        <div class="stat-card"><div class="stat-label">Avg PnL/Trade</div><div class="stat-val" style="color:${avgCol}">${parseFloat(s.avgPnl)>=0?'+':''}${s.avgPnl}%</div></div>
      </div>
      <div class="stat-row"><span>🏆 Best Trade</span><span class="stat-row-val c-green">${s.best?s.best.coin+' +'+s.best.pnl+'%':'—'}</span></div>
      <div class="stat-row"><span>💀 Worst Trade</span><span class="stat-row-val c-red">${s.worst?s.worst.coin+' '+s.worst.pnl+'%':'—'}</span></div>
    </div>
  </div>`;
}
document.getElementById('stats-content').innerHTML = statBlock(D.liveStats,'Live Trades','💰') + statBlock(D.paperStats,'Paper Trades','📄');
async function resetStats(){if(!confirm('Reset trade stats?'))return;const d=await apiFetch('/app/api/stats/reset',{method:'POST',body:'{}'});if(d.ok){showToast('✅ Stats reset');setTimeout(()=>location.reload(),800);}else showToast('❌ '+d.error,'err');}
</script>
</body>
</html>
