<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">⚡ Auto Scanner</h1>
  <div class="panel">
    <div class="panel-body">
      <div class="scanner-status-card" id="status-card">
        <div class="scanner-status-icon" id="status-icon">⚡</div>
        <div>
          <div style="font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:#fff" id="status-title">Loading…</div>
          <div style="font-size:.84rem;color:var(--text2);margin-top:4px" id="status-desc"></div>
          <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-success" id="btn-start" onclick="scannerAction('start')">▶ Start Scanner</button>
            <button class="btn btn-danger"  id="btn-stop"  onclick="scannerAction('stop')">⏹ Stop Scanner</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel" style="margin-top:20px">
    <div class="panel-head"><div class="panel-title">ℹ️ Scanner Info</div></div>
    <div class="panel-body">
      <div class="stat-row"><span>Scanner Type</span><span class="stat-row-val c-cyan">AI 70-Factor</span></div>
      <div class="stat-row"><span>Analysis</span><span class="stat-row-val">SMC + Indicators + Funding + Whale</span></div>
      <div class="stat-row"><span>Live Signals Page</span><span class="stat-row-val"><a href="/admin/signals">View →</a></span></div>
    </div>
  </div>
  <div id="msg" style="margin-top:14px;font-size:.88rem"></div>
</div>

<script src="/js/admin.js"></script>
<script>
const D = window.__DATA__ || {};
renderAdminNav('scanner');

function updateUI(active) {
  const card = document.getElementById('status-card');
  const icon = document.getElementById('status-icon');
  const title = document.getElementById('status-title');
  const desc  = document.getElementById('status-desc');
  if (active) {
    card.classList.add('active');
    icon.textContent = '🟢';
    title.textContent = 'Scanner Active';
    title.style.color = 'var(--green)';
    desc.textContent  = 'Scanning markets — signals pushed to WhatsApp & web feed.';
  } else {
    card.classList.remove('active');
    icon.textContent = '⚡';
    title.textContent = 'Scanner Stopped';
    title.style.color = 'var(--text)';
    desc.textContent  = 'Click Start to begin auto-scanning for high-probability setups.';
  }
}
updateUI(D.scannerActive);

async function scannerAction(action) {
  const msg = document.getElementById('msg');
  msg.textContent = action==='start' ? '🔄 Starting...' : '🔄 Stopping...';
  msg.style.color = 'var(--text2)';
  try {
    const d = await (await fetch('/admin/api/scanner/'+action, {method:'POST',headers:{'Content-Type':'application/json'}})).json();
    updateUI(action==='start');
    msg.textContent = d.ok ? (action==='start'?'✅ Scanner started':'✅ Scanner stopped') : '❌ '+d.error;
    msg.style.color = d.ok ? 'var(--green)' : 'var(--red)';
  } catch(e) { msg.textContent='❌ Network error'; msg.style.color='var(--red)'; }
}
</script>
</body>
</html>
