<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Journal · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">📓 Signal Journal</h1>

  <!-- Live Signals -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head">
      <div class="panel-title">📡 Live Signals <span style="font-size:.75rem;color:var(--text2);margin-left:8px">Real-time from scanner</span></div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="dot dot-green pulse" style="width:8px;height:8px"></span>
        <span style="font-size:.75rem;color:var(--text2)">Live</span>
      </div>
    </div>
    <div class="panel-body" id="live-signals"><div class="loading-center"><div class="spinner"></div></div></div>
  </div>

  <!-- Trade History Journal -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">📋 Trade Outcomes <span style="font-size:.75rem;color:var(--text2);margin-left:8px">Closed trades</span></div>
      <div id="journal-summary" style="font-size:.78rem;color:var(--text2)"></div>
    </div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Coin</th><th>Dir</th><th>Score</th><th>Entry</th><th>TP2</th><th>SL</th><th>Result</th><th>PnL %</th><th>Type</th><th>Date</th></tr></thead>
          <tbody id="journal-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('journal');

function fmtP(n){if(!n||isNaN(n))return'—';const p=parseFloat(n);return p>=1000?'$'+p.toFixed(2):p>=1?'$'+p.toFixed(4):'$'+p.toFixed(6);}

// ── Trade history journal ─────────────────────────────────────
const history = D.history || [];
const wins = history.filter(t=>t.result==='WIN').length;
const losses = history.filter(t=>t.result==='LOSS').length;
const totalPnl = history.reduce((s,t)=>s+(t.pnlPct||0),0);
if (history.length) {
  document.getElementById('journal-summary').textContent =
    `${history.length} trades · ${wins}W/${losses}L · ${totalPnl>=0?'+':''}${totalPnl.toFixed(1)}% PnL`;
}
document.getElementById('journal-body').innerHTML = history.length === 0
  ? '<tr><td colspan="10" class="empty-state"><div class="empty-msg">No closed trades yet</div></td></tr>'
  : history.map(t => {
      const dir = t.direction==='LONG'?'<span class="pill pill-long">▲ L</span>':'<span class="pill pill-short">▼ S</span>';
      const res = t.result==='WIN'?'<span class="pill pill-win">WIN</span>':t.result==='LOSS'?'<span class="pill pill-loss">LOSS</span>':'<span class="pill pill-be">B/E</span>';
      const pct = (t.pnlPct>=0?'+':'')+parseFloat(t.pnlPct).toFixed(2)+'%';
      const pnlCol = t.pnlPct>0?'var(--green)':t.pnlPct<0?'var(--red)':'var(--text2)';
      const scoreCol = t.score>=70?'var(--green)':t.score>=45?'var(--yellow)':t.score>0?'var(--red)':'var(--text2)';
      return `<tr>
        <td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td>
        <td>${dir}</td>
        <td><span style="font-family:var(--font-mono);font-size:.82rem;color:${scoreCol}">${t.score||'—'}</span></td>
        <td style="font-family:var(--font-mono);font-size:.82rem">${t.entry}</td>
        <td style="font-family:var(--font-mono);font-size:.82rem;color:var(--green)">${t.tp2}</td>
        <td style="font-family:var(--font-mono);font-size:.82rem;color:var(--red)">${t.sl}</td>
        <td>${res}</td>
        <td style="font-family:var(--font-mono);font-weight:700;color:${pnlCol}">${pct}</td>
        <td><span style="font-size:.72rem;color:var(--text2)">${t.isPaper?'📄 Paper':'💰 Live'}</span></td>
        <td style="font-size:.78rem;color:var(--text2)">${t.closedAt}</td>
      </tr>`;
    }).join('');

// ── Live signals SSE stream ───────────────────────────────────
const liveEl = document.getElementById('live-signals');
const liveSignals = [];

function renderLiveSignals() {
  if (!liveSignals.length) {
    liveEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-msg">Waiting for scanner signals...</div></div>';
    return;
  }
  liveEl.innerHTML = liveSignals.slice(0,10).map(s => {
    const isL = s.direction==='LONG';
    const sc = s.score>=70?'var(--green)':s.score>=45?'var(--yellow)':'var(--red)';
    const age = Math.floor((Date.now()-s.ts)/60000);
    const ageStr = age<60?age+'m ago':Math.floor(age/60)+'h ago';
    return `<div class="signal-card ${isL?'long-card':'short-card'}" style="margin-bottom:10px;padding:12px 16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="score-ring" style="border-color:${sc};color:${sc};width:38px;height:38px;font-size:.85rem">${s.score}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <strong style="font-family:var(--font-head)">${s.coin}</strong>
            <span class="pill ${isL?'pill-long':'pill-short'}">${isL?'▲':'▼'} ${s.direction}</span>
            <span style="font-size:.7rem;color:var(--text2)">${ageStr}</span>
          </div>
          <div style="font-size:.75rem;color:var(--text2);margin-top:4px;font-family:var(--font-mono)">
            Entry:${fmtP(s.price)} · TP2:${fmtP(s.tp2)} · SL:${fmtP(s.sl)} · ${s.leverage||1}x
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="window.location='/app/scanner'">Scan →</button>
      </div>
    </div>`;
  }).join('');
}

// Load recent signals via API first
apiFetch('/app/api/signals/recent?limit=10').then(d => {
  if (d.ok && d.signals) { liveSignals.push(...d.signals); renderLiveSignals(); }
  else renderLiveSignals();
}).catch(() => renderLiveSignals());

// Then subscribe to live stream
try {
  const es = new EventSource('/app/api/signals/stream');
  es.onmessage = e => {
    try {
      const sig = JSON.parse(e.data);
      if (sig.ping) return;
      liveSignals.unshift(sig);
      renderLiveSignals();
    } catch(_) {}
  };
} catch(_) {}
</script>
</body>
</html>
