<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tracks · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">🎯 Manual Tracks</h1>
  <div id="msg-banner"></div>
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><div class="panel-title">⚡ Active Tracked Trades</div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap"><table>
        <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP2</th><th>SL</th><th>Lev</th><th>Age</th><th>Action</th></tr></thead>
        <tbody id="active-body"></tbody>
      </table></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">📜 Trade History</div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap"><table>
        <thead><tr><th>Coin</th><th>Dir</th><th>Entry</th><th>TP2</th><th>SL</th><th>Result</th><th>PnL%</th><th>Date</th></tr></thead>
        <tbody id="closed-body"></tbody>
      </table></div>
    </div>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('tracks');
if (D.deleted) document.getElementById('msg-banner').innerHTML='<div style="color:var(--green);font-size:.84rem;margin-bottom:12px">✅ Trade deleted.</div>';
const active = D.activeTrades || [];
document.getElementById('active-body').innerHTML = active.length===0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No active tracked trades</div></td></tr>'
  : active.map(t=>{
      const dir=t.direction==='LONG'?'<span class="pill pill-long">▲ LONG</span>':'<span class="pill pill-short">▼ SHORT</span>';
      const st=t.status==='pending'?'<span class="pill pill-pending">PENDING</span>':'<span class="pill pill-active">ACTIVE</span>';
      return `<tr><td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td><td>${dir}</td><td style="font-family:var(--font-mono)">${t.entry}</td><td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td><td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td><td style="font-family:var(--font-mono)">${t.leverage}x</td><td style="color:var(--text2);font-size:.82rem">${t.ageHrs}h</td><td><a href="/app/api/tracks/delete/${t._id}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a></td></tr>`;
    }).join('');
const closed = D.closedTrades || [];
document.getElementById('closed-body').innerHTML = closed.length===0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No history yet</div></td></tr>'
  : closed.map(t=>{
      const dir=t.direction==='LONG'?'<span class="pill pill-long">▲ L</span>':'<span class="pill pill-short">▼ S</span>';
      const res=t.result==='WIN'?'<span class="pill pill-win">WIN</span>':t.result==='LOSS'?'<span class="pill pill-loss">LOSS</span>':'<span class="pill pill-be">B/E</span>';
      const pnl=t.pnlPct?(t.pnlPct>=0?'+':'')+parseFloat(t.pnlPct).toFixed(2)+'%':'—';
      return `<tr><td><strong style="font-family:var(--font-mono)">${t.coin}</strong></td><td>${dir}</td><td style="font-family:var(--font-mono)">${t.entry}</td><td style="font-family:var(--font-mono);color:var(--green)">${t.tp2}</td><td style="font-family:var(--font-mono);color:var(--red)">${t.sl}</td><td>${res}</td><td style="font-family:var(--font-mono);color:${t.pnlPct>0?'var(--green)':t.pnlPct<0?'var(--red)':'var(--text2)'}">${pnl}</td><td style="font-size:.8rem;color:var(--text2)">${t.closedAt}</td></tr>`;
    }).join('');
</script>
</body>
</html>
