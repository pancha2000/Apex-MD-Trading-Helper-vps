<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users · Apex-MD Admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/main.css">
<style>
.tier-free{background:rgba(255,255,255,.07);color:var(--text2);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:2px 10px;font-size:.7rem;font-weight:700}
.tier-vip{background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,165,0,.15));color:gold;border:1px solid rgba(255,215,0,.4);border-radius:99px;padding:2px 10px;font-size:.7rem;font-weight:700}
.act-btns{display:flex;gap:5px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">👥 Users <span id="user-count" style="font-size:.9rem;color:var(--text2);font-weight:400"></span></h1>

  <!-- Stats -->
  <div class="g-stats" style="margin-bottom:20px" id="user-stats"></div>

  <!-- Feature Flags Panel -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head">
      <div class="panel-title">🎛️ Feature Access Control</div>
      <span style="font-size:.75rem;color:var(--text2)">Per-tier on/off</span>
    </div>
    <div class="panel-body" id="feature-panel">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Users Table -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">All Users</div>
      <div style="font-size:.8rem;color:var(--text2)">Register at <a href="/auth/register">/auth/register</a></div>
    </div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Username</th><th>Email</th><th>Tier</th><th>Role</th><th>Status</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr></thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
<script>
const D = window.__DATA__ || {};
renderAdminNav('users');

const users = D.users || [];
document.getElementById('user-count').textContent = (D.totalUsers||0) + ' total';

// Stats
const vips  = users.filter(u=>u.tier==='vip').length;
const frees = users.filter(u=>u.tier==='free').length;
document.getElementById('user-stats').innerHTML = [
  {label:'Total Users', val: D.totalUsers||0, cls:'c-cyan'},
  {label:'VIP',         val: vips,            cls:'c-yellow'},
  {label:'Free',        val: frees,           cls:''},
  {label:'Admins',      val: users.filter(u=>u.role==='admin').length, cls:'c-red'},
].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-val ${s.cls}">${s.val}</div></div>`).join('');

// Feature flags
const FEATURES = [
  {key:'scanner',   label:'⚡ Scanner'},
  {key:'paper',     label:'📄 Paper Trade'},
  {key:'alerts',    label:'🔔 Alerts'},
  {key:'watchlist', label:'👁 Watchlist'},
  {key:'news',      label:'📰 Intel'},
  {key:'heatmap',   label:'🌡️ Heatmap'},
  {key:'compare',   label:'⚖️ Compare'},
  {key:'backtest',  label:'🧪 Backtest'},
  {key:'journal',   label:'📓 Journal'},
  {key:'portfolio', label:'💼 Portfolio'},
  {key:'ai',        label:'🤖 AI Chat'},
  {key:'calc',      label:'🧮 Calc'},
  {key:'grid',      label:'🕸 Grid'},
  {key:'funding',   label:'💸 Funding'},
  {key:'stats',     label:'📊 Stats'},
];

async function loadFeatureFlags() {
  const panel = document.getElementById('feature-panel');
  const d = await apiFetch('/admin/api/features');
  if (!d.ok) { panel.innerHTML = '<div style="color:var(--red)">❌ Failed</div>'; return; }
  const flags = d.flags;
  panel.innerHTML = `
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px 12px;font-size:.78rem;color:var(--text2);font-weight:600">Feature</th>
          <th style="text-align:center;padding:8px 16px;font-size:.78rem;color:var(--text2);font-weight:600">🆓 Free</th>
          <th style="text-align:center;padding:8px 16px;font-size:.78rem;color:gold;font-weight:600">👑 VIP</th>
        </tr>
      </thead>
      <tbody>${FEATURES.map(f => `
        <tr style="border-top:1px solid var(--border)">
          <td style="padding:8px 12px;font-size:.84rem">${f.label}</td>
          <td style="text-align:center;padding:8px">
            <label class="toggle" style="width:38px;height:21px">
              <input type="checkbox" ${flags.free?.[f.key]?'checked':''} onchange="setFlag('free','${f.key}',this.checked)">
              <span class="slider"></span>
            </label>
          </td>
          <td style="text-align:center;padding:8px">
            <label class="toggle" style="width:38px;height:21px">
              <input type="checkbox" ${flags.vip?.[f.key]?'checked':''} onchange="setFlag('vip','${f.key}',this.checked)">
              <span class="slider"></span>
            </label>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}
loadFeatureFlags();

async function setFlag(tier, feature, enabled) {
  const d = await apiFetch(`/admin/api/features/${tier}/${feature}`, {method:'POST', body:JSON.stringify({enabled})});
  showToast(d.ok ? `✅ ${tier.toUpperCase()} · ${feature} → ${enabled?'ON':'OFF'}` : '❌ '+d.error, d.ok?'ok':'err');
}

// Users table
document.getElementById('users-body').innerHTML = users.length === 0
  ? '<tr><td colspan="8" class="empty-state"><div class="empty-msg">No users yet</div></td></tr>'
  : users.map(u => {
      const tierPill   = u.tier==='vip'   ? '<span class="tier-vip">👑 VIP</span>' : '<span class="tier-free">🆓 Free</span>';
      const rolePill   = u.role==='admin' ? '<span class="pill pill-admin" style="background:rgba(255,51,85,.15);color:#ff6b6b;border-color:rgba(255,51,85,.3)">👑 admin</span>' : '<span class="pill pill-user">👤 user</span>';
      const statusPill = u.status==='active' ? '<span class="pill pill-ok">✅ active</span>' : '<span class="pill pill-susp">🚫 susp</span>';
      const tierBtn    = u.tier==='vip'
        ? `<button class="btn btn-sm" onclick="setTier('${u.id}','free')" style="background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);color:var(--text2)">→ Free</button>`
        : `<button class="btn btn-sm" onclick="setTier('${u.id}','vip')" style="background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:gold">→ VIP 👑</button>`;
      const statusBtn  = u.status==='active'
        ? `<button class="btn btn-danger btn-sm" onclick="setStatus('${u.id}','suspended')">Suspend</button>`
        : `<button class="btn btn-success btn-sm" onclick="setStatus('${u.id}','active')">Activate</button>`;
      const roleBtn    = u.role==='admin'
        ? `<button class="btn btn-sm" onclick="setRole('${u.id}','user')" style="background:rgba(255,171,0,.1);border-color:rgba(255,171,0,.3);color:var(--yellow)">→ User</button>`
        : `<button class="btn btn-sm" onclick="setRole('${u.id}','admin')" style="background:rgba(255,51,85,.1);border-color:rgba(255,51,85,.3);color:#ff6b6b">→ Admin</button>`;
      const deleteBtn  = u.role!=='admin'
        ? `<button class="btn btn-sm" onclick="deleteUser('${u.id}','${u.username}')" style="background:rgba(255,51,85,.15);border-color:rgba(255,51,85,.4);color:var(--red)">🗑️</button>`
        : '';
      return `<tr>
        <td><strong>${u.username}</strong></td>
        <td style="color:var(--text2);font-size:.8rem">${u.email}</td>
        <td>${tierPill}</td>
        <td>${rolePill}</td>
        <td>${statusPill}</td>
        <td style="font-size:.78rem;color:var(--text2)">${u.createdAt}</td>
        <td style="font-size:.78rem;color:var(--text2)">${u.lastLoginAt}<br><span style="color:var(--text3)">(${u.loginCount}x)</span></td>
        <td><div class="act-btns">${tierBtn}${statusBtn}${roleBtn}${deleteBtn}</div></td>
      </tr>`;
    }).join('');

async function setTier(id, tier) {
  const d = await apiFetch(`/admin/api/users/${id}/tier`, {method:'POST', body:JSON.stringify({tier})});
  showToast(d.ok ? `✅ Tier → ${tier.toUpperCase()}` : '❌ '+d.error, d.ok?'ok':'err');
  if (d.ok) setTimeout(()=>location.reload(), 1000);
}
async function setStatus(id, status) {
  if (!confirm('Change status to "'+status+'"?')) return;
  const d = await apiFetch(`/admin/api/users/${id}/status`, {method:'POST', body:JSON.stringify({status})});
  showToast(d.ok ? '✅ Status → '+status : '❌ '+d.error, d.ok?'ok':'err');
  if (d.ok) setTimeout(()=>location.reload(), 1000);
}
async function setRole(id, role) {
  if (!confirm('Change role to "'+role+'"?')) return;
  const d = await apiFetch(`/admin/api/users/${id}/role`, {method:'POST', body:JSON.stringify({role})});
  showToast(d.ok ? '✅ Role → '+role : '❌ '+d.error, d.ok?'ok':'err');
  if (d.ok) setTimeout(()=>location.reload(), 1000);
}
async function deleteUser(id, username) {
  if (!confirm(`⚠️ Permanently DELETE user "${username}"?\n\nThis will also delete all their trades. This CANNOT be undone!`)) return;
  if (!confirm(`Are you absolutely sure? Delete "${username}"?`)) return;
  const d = await (await fetch(`/admin/api/users/${id}`, {method:'DELETE'})).json();
  showToast(d.ok ? `✅ User "${username}" deleted` : '❌ '+d.error, d.ok?'ok':'err');
  if (d.ok) setTimeout(()=>location.reload(), 1200);
}
</script>
</body>
</html>
