<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watchlist · Apex-MD</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="nav-root"></div>
<div class="wrap">
  <h1 class="page-title">👁 Watchlist <span id="coin-count"></span></h1>
  <div id="wa-warn"></div>
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-head"><div class="panel-title">➕ Add Coin</div></div>
    <div class="panel-body">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:180px"><label class="field-label">Coins (comma separated)</label><input type="text" id="w-coins" class="inp" placeholder="BTC, ETH, SOL..." style="font-family:var(--font-mono);text-transform:uppercase"></div>
        <button class="btn btn-primary" onclick="addCoins()">👁 Add</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">🗑️ Clear All</button>
        <button class="btn btn-ghost btn-sm" onclick="refreshPrices()">↺ Prices</button>
      </div>
      <div id="w-msg" style="margin-top:8px;font-size:.83rem"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">💰 Tracked Coins</div></div>
    <div class="panel-body" style="padding:0">
      <div class="tbl-wrap"><table>
        <thead><tr><th>Coin</th><th>Price</th><th>24h %</th><th>Action</th></tr></thead>
        <tbody id="coins-body"></tbody>
      </table></div>
    </div>
  </div>
</div>
<script src="/js/user.js"></script>
<script>
const D = window.__DATA__ || {};
renderUserNav('watchlist');
if (!D.waLinked) document.getElementById('wa-warn').innerHTML = '<div style="background:rgba(255,171,0,.07);border:1px solid rgba(255,171,0,.2);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:.84rem;color:var(--yellow)">⚠️ WhatsApp not linked. <a href="/app/settings">Link →</a></div>';
const coins = D.coins || [];
document.getElementById('coin-count').textContent = coins.length+' / 15';
function renderCoins(priceMap={}) {
  document.getElementById('coins-body').innerHTML = coins.length===0
    ? '<tr><td colspan="4" class="empty-state"><div class="empty-msg">No coins tracked yet</div></td></tr>'
    : coins.map(c=>{
        const p=priceMap[c]; const name=c.replace('USDT','');
        const priceStr=p?.price?'$'+parseFloat(p.price).toFixed(4):'—';
        const chg=p?.change?parseFloat(p.change):null;
        const chgStr=chg!=null?(chg>=0?'+':'')+chg.toFixed(2)+'%':'—';
        const chgCol=chg>0?'var(--green)':chg<0?'var(--red)':'var(--text2)';
        return `<tr><td><strong style="font-family:var(--font-mono)">${name}</strong><span style="color:var(--text2);font-size:.72rem"> USDT</span></td><td style="font-family:var(--font-mono)">${priceStr}</td><td style="font-family:var(--font-mono);font-weight:600;color:${chgCol}">${chgStr}</td><td><button class="btn btn-danger btn-sm" onclick="removeCoin('${c}')">✕</button></td></tr>`;
      }).join('');
}
renderCoins();
async function refreshPrices(){
  const d=await apiFetch('/app/api/watchlist/prices');
  if(d.ok&&d.prices){const m={};d.prices.forEach(p=>m[p.coin]=p);renderCoins(m);}
}
async function addCoins(){
  const msg=document.getElementById('w-msg');
  const raw=document.getElementById('w-coins').value.trim();
  if(!raw){msg.style.color='var(--red)';msg.textContent='❌ Enter at least one coin';return;}
  const arr=raw.split(/[\s,]+/).filter(Boolean);
  msg.style.color='var(--text2)';msg.textContent='⏳...';
  const d=await apiFetch('/app/api/watchlist',{method:'POST',body:JSON.stringify({coins:arr})});
  if(d.ok){showToast('✅ Added '+d.added+' coin(s)');setTimeout(()=>location.reload(),700);}else{msg.style.color='var(--red)';msg.textContent='❌ '+d.error;}
}
async function removeCoin(c){const d=await apiFetch('/app/api/watchlist/'+c.replace('USDT',''),{method:'DELETE'});if(d.ok)location.reload();else showToast('❌ '+d.error,'err');}
async function clearAll(){if(!confirm('Clear all watched coins?'))return;const d=await apiFetch('/app/api/watchlist/clear',{method:'POST',body:'{}'});if(d.ok){showToast('✅ Cleared');setTimeout(()=>location.reload(),700);}else showToast('❌ '+d.error,'err');}
refreshPrices();
</script>
</body>
</html>
